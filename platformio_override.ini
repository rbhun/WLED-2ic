[platformio]
default_envs = dig-octa-eth-ar-7out-7btn

[env:dig-octa-eth-ar-7out-7btn]
platform = ${esp32.platform}
framework = ${esp32.framework}
board = esp32dev

build_flags =
  ${common.build_flags}
  ${esp32.build_flags}
  ${AR_build_flags}

  -D WLED_USE_ETHERNET
  -D WLED_ETH_DEFAULT=8

  -D DATA_PINS=0,1,2,3,4,5,12
  -D PIXEL_COUNTS=30,30,30,30,30,30,30

  -D WLED_MAX_BUTTONS=7
  -D BTNPIN=13,14,15,16,32,34,35
  -D BTNTYPE=BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH,BTN_TYPE_PUSH

lib_deps =
  ${esp32.lib_deps}
  ${AR_lib_deps}
